<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chennai Airport Hub - Executive Visualization</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100% !important; width: 100% !important; font-family: 'Segoe UI', Tahoma, sans-serif; background: #0f172a; overflow: hidden; }
        #map { position: absolute; top: 0; left: 0; right: 0; bottom: 0; height: 100% !important; width: 100% !important; }

        /* Premium Dark Slate Tooltip Design */
        .custom-tooltip {
            background: rgba(15, 23, 42, 0.95) !important;
            color: #f8fafc !important;
            border: 1px solid rgba(56, 189, 248, 0.4) !important;
            border-radius: 8px !important;
            padding: 12px 16px !important;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5) !important;
            font-size: 12px;
            line-height: 1.5;
        }
        .custom-tooltip::before { border-right-color: rgba(15, 23, 42, 0.95) !important; }
        
        .tooltip-title { font-weight: 700; color: #38bdf8; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; font-size: 13px; }
        .tooltip-meta { font-size: 10px; color: #94a3b8; font-style: italic; margin-bottom: 6px; }
    </style>
</head>
<body>

<div id="map"></div>

<script>
    const mapCenter = [12.9920, 80.1680];
    const map = L.map('map').setView(mapCenter, 14); 

    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        attribution: 'Imagery &copy; Esri'
    }).addTo(map);

    const airportBoundaryCoords = [
        [13.0065, 80.1548], [13.0070, 80.1598], [13.0068, 80.1652], [13.0062, 80.1715],
        [13.0056, 80.1770], [13.0048, 80.1816], [13.0038, 80.1845], [13.0015, 80.1858],
        [12.9990, 80.1860], [12.9962, 80.1854], [12.9882, 80.1812], [12.9855, 80.1782], 
        [12.9830, 80.1735], [12.9818, 80.1680], [12.9818, 80.1622], [12.9822, 80.1570],
        [12.9836, 80.1535], [12.9858, 80.1516], [12.9890, 80.1504], [12.9930, 80.1508],
        [12.9970, 80.1518], [13.0010, 80.1528], [13.0042, 80.1539], [13.0065, 80.1548]
    ];

    const airportHighlightZone = L.polygon(airportBoundaryCoords, {
        color: '#0ea5e9',
        weight: 3,
        opacity: 0.9,
        fillColor: '#0ea5e9',
        fillOpacity: 0.15
    }).addTo(map);

    airportHighlightZone.bindPopup("<strong style='color:#0ea5e9;'>CHENNAI INTERNATIONAL AIRPORT (MAA)</strong>");

    const infrastructureAssets = [
        {
            name: "Integrated Terminal 2 (T2)",
            type: "Passenger Infrastructure",
            desc: "The core international processing facility, clearly visible via its bright wave-shaped roof architectures.",
            coords: [12.9941, 80.1805]
        },
        {
            name: "Chennai Airport Metro Station",
            type: "Intermodal Connectivity",
            desc: "Direct elevated connection point tying the passenger terminals into the metropolitan rail network.",
            coords: [12.9958, 80.1837]
        },
        {
            name: "Primary Runway 07/25",
            type: "Airside Infrastructure",
            desc: "Main 3,660-meter operational strip handling heavy commercial airliner movements.",
            coords: [12.9910, 80.1710]
        }
    ];

    infrastructureAssets.forEach(asset => {
        const nodeMarker = L.circleMarker(asset.coords, {
            radius: 8,
            fillColor: "#38bdf8", 
            color: "#ffffff",     
            weight: 2,
            fillOpacity: 0.9,
            interactive: true
        }).addTo(map);

        // Fixed HTML generation string without breaking spaces
        const contentString = '<div class="tooltip-title">' + asset.name + '</div>' +
                              '<div class="tooltip-meta">' + asset.type + '</div>' +
                              '<div>' + asset.desc + '</div>';

        nodeMarker.bindTooltip(contentString, {
            className: 'custom-tooltip',
            direction: 'right',
            sticky: true,
            opacity: 0.98
        });

        nodeMarker.on('mouseover', function () {
            this.setStyle({ fillColor: '#22c55e', radius: 10 });
        });
        nodeMarker.on('mouseout', function () {
            this.setStyle({ fillColor: '#38bdf8', radius: 8 });
        });
    });

    // Handle map scaling automatically
    window.addEventListener('resize', () => { map.invalidateSize(); });
</script>

</body>
</html>
